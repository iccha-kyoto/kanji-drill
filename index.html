<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>漢字 暗記カード</title>
<style>
  :root{--bg1:#10395c;--bg2:#0b2a4a;--card:#fff;--ink:#1b2430;--accent:#ff7a18;--accent2:#ffb347;--good:#1fb35a;--bad:#e23b3b;--sub:#5a6b7d;--line:#d7e3ee;--blue:#2f7fbf;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--ink);display:flex;justify-content:center;align-items:flex-start;min-height:100%;}
  #app{width:100%;max-width:560px;min-height:100vh;display:flex;flex-direction:column;position:relative;}
  .btn{border:none;border-radius:14px;padding:14px 16px;font-size:18px;font-weight:800;color:#fff;background:linear-gradient(180deg,var(--accent2),var(--accent));box-shadow:0 4px 0 #c85a00,0 6px 14px rgba(0,0,0,.25);cursor:pointer;}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c85a00;}
  .btn:disabled{opacity:.5;}
  .btn.sub{background:linear-gradient(180deg,#9fb3c8,#6b7d93);box-shadow:0 4px 0 #4c5b6e;}
  .btn.ghost{background:#fff;color:var(--accent);border:2px solid var(--accent);box-shadow:none;}
  .btn.ok{background:linear-gradient(180deg,#5fd08a,#1fb35a);box-shadow:0 4px 0 #14803f;}
  .btn.ng{background:linear-gradient(180deg,#ff9a9a,#e23b3b);box-shadow:0 4px 0 #a52121;}
  .btn.mic{background:linear-gradient(180deg,#7ec8ff,#2f7fbf);box-shadow:0 4px 0 #1f5e90;}
  .btn.blue{background:linear-gradient(180deg,#7ec8ff,#2f7fbf);box-shadow:0 4px 0 #1f5e90;}
  .btn.sm{padding:6px 12px;font-size:13px;border-radius:10px;box-shadow:none;}
  #setup{flex:1;display:flex;flex-direction:column;gap:12px;padding:18px 18px 28px;color:#fff;}
  #setup h1{font-size:24px;margin:2px 0 0;text-align:center;}
  #setup .lead{text-align:center;color:#cfe6ff;font-size:12px;margin-bottom:2px;}
  .panel{background:rgba(255,255,255,.96);color:var(--ink);border-radius:16px;padding:13px;box-shadow:0 8px 22px rgba(0,0,0,.22);}
  .panel h2{margin:2px 0 9px;font-size:14px;color:var(--blue);}
  .daily{display:flex;gap:10px;}.daily .btn{flex:1;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{border:3px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:15px;font-weight:800;color:var(--sub);cursor:pointer;}
  .chip.on{border-color:var(--accent);background:#fff3e6;color:var(--accent);}
  .chip.disabled{opacity:.4;cursor:not-allowed;}
  .secgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .secgrid .chip{justify-self:stretch;text-align:center;padding:10px 0;}
  .mixrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;border-top:1px dashed var(--line);padding-top:10px;}
  .mixrow .lbl{font-size:12px;color:var(--sub);width:100%;font-weight:800;}
  #soundBtn{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:18px;padding:6px 10px;border-radius:10px;cursor:pointer;z-index:5;}
  #quiz{flex:1;display:none;flex-direction:column;padding:14px 16px 20px;}
  #topbar{display:flex;justify-content:space-between;align-items:center;color:#fff;font-weight:800;margin-bottom:8px;}
  #topbar .info{font-size:14px;}
  #tally{font-size:13px;color:#cfe6ff;margin-bottom:6px;text-align:right;}
  #progwrap{height:8px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden;margin-bottom:12px;}
  #prog{height:100%;width:0%;background:var(--accent);transition:width .25s;}
  #card{background:var(--card);border-radius:20px;padding:22px 18px;box-shadow:0 10px 28px rgba(0,0,0,.28);flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;min-height:300px;position:relative;overflow:hidden;}
  #qlabel{font-size:13px;font-weight:800;color:#fff;background:var(--accent);padding:3px 14px;border-radius:999px;}
  #sentence{font-size:32px;font-weight:800;line-height:1.7;text-align:center;color:var(--ink);}
  #sentence u{text-decoration:none;border-bottom:4px solid var(--accent);padding:0 2px;}
  #padwrap{display:none;flex-direction:column;align-items:center;gap:4px;}
  #pad{width:280px;height:220px;border:2px dashed var(--line);border-radius:12px;background:#fff;touch-action:none;}
  #padhint{font-size:12px;color:#aab6c2;}
  #answerbox{text-align:center;min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .masked{font-size:30px;letter-spacing:6px;color:#b9c6d4;}
  #ans{font-size:34px;font-weight:900;color:var(--good);}
  #ansSub{font-size:18px;color:var(--sub);font-weight:700;}
  #voiceStatus{font-size:15px;color:var(--blue);font-weight:700;min-height:20px;text-align:center;}
  #ansHint{font-size:13px;color:var(--sub);text-align:center;}
  #flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;pointer-events:none;opacity:0;}
  @keyframes pop{0%{transform:scale(.4);opacity:0}25%{transform:scale(1.15);opacity:1}80%{opacity:1}100%{opacity:0}}
  #flash.show{animation:pop 1.1s ease forwards;}
  #controls{display:flex;gap:8px;margin-top:14px;align-items:stretch;}
  #prevBtn{flex:0 0 auto;}
  #micBtn{flex:1.4;}#revealBtn{flex:1;}#clearBtn{flex:0 0 auto;}
  #judgeRow{flex:1;display:none;gap:8px;}#judgeRow .btn{flex:1;}
  #done{display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;color:#fff;flex:1;padding:30px;}
  #done .big{font-size:46px;}#doneInfo{font-size:20px;font-weight:800;}
  #done .btn{width:100%;max-width:360px;}
  #weak{display:none;flex-direction:column;flex:1;padding:14px 16px 24px;color:#fff;gap:10px;}
  #weak .wtop{display:flex;justify-content:space-between;align-items:center;}
  #weakBody{overflow:auto;}
  .wgrp{background:rgba(255,255,255,.96);color:var(--ink);border-radius:14px;padding:10px 12px;margin-bottom:10px;}
  .wgh{display:flex;justify-content:space-between;align-items:center;font-weight:800;color:var(--bad);margin-bottom:6px;font-size:15px;}
  .wrow{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-top:1px solid #eef2f6;font-size:14px;}
  .wrow b{font-size:17px;}.wrow small{color:var(--sub);flex:1;}.wrow em{color:var(--bad);font-weight:800;font-style:normal;}
  .small{font-size:12px;color:#9fb3c8;text-align:center;margin-top:4px;}
  .mini{font-size:12px;color:#cfe6ff;}
</style></head>
<body><div id="app">
  <button id="soundBtn">🔊</button>
  <section id="setup">
    <h1>漢字 暗記カード</h1><div class="lead">声で読み・手書きで書き・苦手は毎日復習</div>
    <div class="panel"><h2>📅 毎日の練習</h2>
      <div class="daily">
        <button class="btn blue" id="reviewTodayBtn">今日の復習<br><span class="mini" id="dueLbl">0問</span></button>
        <button class="btn sub" id="weakListBtn">苦手リスト<br><span class="mini" id="weakLbl">0問</span></button>
      </div>
      <div class="small" id="todayLog" style="color:var(--sub);"></div>
    </div>
    <div class="panel"><h2>① だん</h2><div class="chips" id="danChips"></div></div>
    <div class="panel"><h2>② セクション</h2><div class="secgrid" id="secChips"></div>
      <div class="mixrow" id="mixRow"><div class="lbl">▼ 段まとめ（ランダム出題）</div></div></div>
    <div class="panel"><h2>③ モード</h2><div class="chips" id="modeChips">
      <div class="chip on" data-mode="yomi">読み（声で答える🎤）</div>
      <div class="chip" data-mode="kaki">書き（手書き✍️）</div></div></div>
    <button class="btn" id="startBtn" style="font-size:20px;">スタート ▶</button>
  </section>
  <section id="quiz">
    <div id="topbar"><div class="info" id="qhead"></div><button class="btn sub" id="backBtn" style="padding:6px 12px;font-size:13px;">メニュー</button></div>
    <div id="tally"></div>
    <div id="progwrap"><div id="prog"></div></div>
    <div id="card">
      <span id="qlabel">読み</span>
      <div id="sentence">—</div>
      <div id="padwrap"><canvas id="pad"></canvas><div id="padhint">ここに漢字を書いてみよう（指・ペン）</div></div>
      <div id="answerbox"><div class="masked" id="masked">◼◼◼</div><div id="ans" style="display:none;"></div><div id="ansSub" style="display:none;"></div></div>
      <div id="voiceStatus"></div>
      <div id="ansHint"></div>
      <div id="flash"></div>
    </div>
    <div id="controls">
      <button class="btn ghost" id="prevBtn">◀</button>
      <button class="btn mic" id="micBtn">🎤 声で読む</button>
      <button class="btn sub" id="clearBtn">けす</button>
      <button class="btn" id="revealBtn">答えを見る</button>
      <div id="judgeRow"><button class="btn ng" id="wrongBtn">❌ まちがえた</button><button class="btn ok" id="rightBtn">⭕ できた</button></div>
    </div>
  </section>
  <section id="done"><div class="big" id="doneEmoji">🎉</div><div id="doneTitle" style="font-size:22px;font-weight:800;">おわり！</div>
    <div id="doneInfo"></div>
    <button class="btn ng" id="reviewBtn" style="display:none;">復習</button>
    <button class="btn" id="againBtn">同じ範囲をもう一度</button>
    <button class="btn sub" id="menuBtn2">メニューへ</button></section>
  <section id="weak">
    <div class="wtop"><div style="font-size:18px;font-weight:800;">💪 苦手リスト</div><button class="btn sub sm" id="weakBack">メニュー</button></div>
    <div class="mini">まちがえた回数が多い順。「練習」でその語だけ出題します（モードは下で選択）。</div>
    <div class="chips" id="weakMode" style="margin:4px 0;">
      <div class="chip on" data-wmode="yomi">読み🎤</div><div class="chip" data-wmode="kaki">書き✍️</div></div>
    <div id="weakBody"></div>
  </section>
</div>

/* ----- 音 ----- */
let actx=null,soundOn=true;
function ac(){if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();return actx;}
function tone(f,t0,dur,type,vol){const o=ac().createOscillator(),g=ac().createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(ac().destination);const t=ac().currentTime+t0;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.02);}
function chime(){if(!soundOn)return;try{[[880,0],[1175,.09],[1568,.18]].forEach(([f,t])=>tone(f,t,.22,"triangle",.25));}catch(e){}}
function buzz(){if(!soundOn)return;try{tone(196,0,.25,"sawtooth",.18);}catch(e){}}
$("#soundBtn").onclick=()=>{soundOn=!soundOn;$("#soundBtn").textContent=soundOn?"🔊":"🔇";if(soundOn)try{ac().resume();}catch(e){}};

/* ----- 音声認識（インスタンス再利用） ----- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null,recBusy=false;
function kata2hira(s){return s.replace(/[ァ-ヶ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60));}
function norm(s){return kata2hira((s||"")).replace(/[\s　・、。,.!！?？ー]/g,"");}
function voiceHit(list,it){const ny=norm(it.y);for(const r of list){const nr=norm(r);if(!nr)continue;if(nr===ny)return true;if((r||"").indexOf(it.t)>=0)return true;if(ny.length>=2&&nr.indexOf(ny)>=0)return true;}return false;}
function ensureRec(){if(rec||!SR)return;rec=new SR();rec.lang="ja-JP";rec.interimResults=false;rec.maxAlternatives=5;
  rec.onresult=e=>{const list=[];for(let i=0;i<e.results.length;i++){const r=e.results[i];for(let j=0;j<r.length;j++)list.push(r[j].transcript);}
    if(voiceHit(list,items[idx]))voiceCorrect();else $("#voiceStatus").textContent="🤔 「"+(list[0]||"")+"」… おしい！もう一度どうぞ";};
  rec.onerror=ev=>{$("#voiceStatus").textContent=(ev.error==="not-allowed")?"⚠️ マイクの使用を許可してください":"もう一度どうぞ";};
  rec.onend=()=>{recBusy=false;$("#micBtn").disabled=false;};}
function startVoice(){if(!SR){$("#voiceStatus").textContent="⚠️ この端末は音声認識に対応していません";return;}if(recBusy)return;recBusy=true;ensureRec();
  try{ac().resume();}catch(e){}$("#micBtn").disabled=true;$("#voiceStatus").textContent="🎤 聞いています…　声に出して読んでね";
  try{rec.start();}catch(e){recBusy=false;$("#micBtn").disabled=false;}}
function voiceCorrect(){chime();flashMsg("⭕ せいかい！",true);doReveal();setTimeout(()=>judge(true,true),1200);}

/* ----- 手書き ----- */
const pad=$("#pad");let pctx=null,drawing=false;
function setupPad(){const dpr=window.devicePixelRatio||1,w=280,h=220;pad.width=w*dpr;pad.height=h*dpr;pctx=pad.getContext("2d");pctx.scale(dpr,dpr);pctx.lineWidth=9;pctx.lineCap="round";pctx.lineJoin="round";pctx.strokeStyle="#1b2430";clearPad();}
function clearPad(){if(pctx)pctx.clearRect(0,0,pad.width,pad.height);}
function pp(e){const r=pad.getBoundingClientRect();return[(e.clientX)-r.left,(e.clientY)-r.top];}
pad.addEventListener("pointerdown",e=>{drawing=true;const[x,y]=pp(e);pctx.beginPath();pctx.moveTo(x,y);e.preventDefault();});
pad.addEventListener("pointermove",e=>{if(!drawing)return;const[x,y]=pp(e);pctx.lineTo(x,y);pctx.stroke();e.preventDefault();});
window.addEventListener("pointerup",()=>drawing=false);

/* ----- セットアップUI ----- */
let setDan=null,selKind="sec",selSec="その1",selMixN=30,setMode="yomi";
let items=[],idx=0,revealed=false,answered=false,sessionWrong=[];
let baseItems=[],baseTitle="",baseMix=false,quizTitle="",lastWrong=[],sessionRecord=true;
function danHas(d){return DATA[d]&&Object.values(DATA[d]).some(a=>a.length>0);}
function secHas(d,s){return DATA[d]&&DATA[d][s]&&DATA[d][s].length>0;}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const danWrap=$("#danChips");
DANS.forEach(d=>{const ok=danHas(d);const c=document.createElement("div");c.className="chip"+(!ok?" disabled":"");c.textContent=d;c.dataset.dan=d;if(ok)c.onclick=()=>{danWrap.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');setDan=d;buildSecs();};danWrap.appendChild(c);});
setDan=DANS.find(danHas);[...danWrap.children].forEach(c=>{if(c.dataset.dan===setDan)c.classList.add('on');});
const secWrap=$("#secChips"),mixRow=$("#mixRow");
function clearSel(){secWrap.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));mixRow.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));}
function buildSecs(){secWrap.innerHTML="";SECS.forEach(s=>{const ok=secHas(setDan,s);const c=document.createElement("div");c.className="chip"+(!ok?" disabled":"");c.textContent=s.replace("その","");c.dataset.sec=s;if(ok)c.onclick=()=>{clearSel();c.classList.add('on');selKind="sec";selSec=s;};secWrap.appendChild(c);});
  mixRow.querySelectorAll('.mixbtn').forEach(x=>x.remove());
  [["20","20問"],["30","30問"],["50","50問"],["0","ぜんぶ"]].forEach(([v,t])=>{const c=document.createElement("div");c.className="chip mixbtn";c.textContent=t;c.dataset.mix=v;c.onclick=()=>{clearSel();c.classList.add('on');selKind="mix";selMixN=parseInt(v,10);};mixRow.appendChild(c);});
  clearSel();selKind="sec";const first=SECS.find(s=>secHas(setDan,s));selSec=first;[...secWrap.children].forEach(c=>{if(c.dataset.sec===first)c.classList.add('on');});}
buildSecs();
$("#modeChips").addEventListener("click",e=>{const c=e.target.closest('.chip');if(!c)return;$("#modeChips").querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');setMode=c.dataset.mode;});
function show(id){["#setup","#quiz","#done","#weak"].forEach(s=>$(s).style.display="none");$(id).style.display="flex";if(id==="#setup")refreshDaily();}
function refreshDaily(){$("#dueLbl").textContent=dueItems().length+"問";$("#weakLbl").textContent=weakItems().length+"問";const c=store.log[today()]||0;$("#todayLog").textContent=c?("今日やった: "+c+"問"):"";}

/* ----- セッション ----- */
$("#startBtn").onclick=()=>{try{ac().resume();}catch(e){}
  if(selKind==="mix"){let all=[];SECS.forEach(s=>{if(secHas(setDan,s))all=all.concat(DATA[setDan][s]);});all=shuffle(all);baseItems=selMixN>0?all.slice(0,selMixN):all;baseTitle=setDan+" ランダム"+baseItems.length+"問";baseMix=true;}
  else{if(!secHas(setDan,selSec)){alert("データがありません");return;}baseItems=DATA[setDan][selSec].slice();baseTitle=setDan+" "+selSec;baseMix=false;}
  if(!pctx)setupPad();startSession(baseItems.slice(),baseTitle);};
$("#reviewTodayBtn").onclick=()=>{const d=dueItems();if(!d.length){alert("今日の復習はありません。新しいセクションを進めましょう！");return;}if(!pctx)setupPad();baseMix=true;baseItems=d.slice();baseTitle="今日の復習";startSession(shuffle(d),"今日の復習");};
function startSession(list,title){items=list;quizTitle=title;idx=0;sessionWrong=[];show("#quiz");render();}
$("#backBtn").onclick=()=>{if(rec)try{rec.abort();}catch(e){}show("#setup");};
$("#menuBtn2").onclick=()=>show("#setup");
$("#againBtn").onclick=()=>{let l=baseItems.slice();if(baseMix)l=shuffle(l);startSession(l,baseTitle);};
$("#reviewBtn").onclick=()=>{baseMix=true;baseItems=lastWrong.slice();startSession(lastWrong.slice(),quizTitle.replace(/（復習）/,"")+"（復習）");};

function esc(t){return t.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function ulKanji(s,t){const i=s.indexOf(t);if(i<0)return esc(s);return esc(s.slice(0,i))+"<u>"+esc(t)+"</u>"+esc(s.slice(i+t.length));}
function repKana(s,t,y){const i=s.indexOf(t);if(i<0)return esc(s);return esc(s.slice(0,i))+"<u>"+esc(y)+"</u>"+esc(s.slice(i+t.length));}
function updTally(){const w=sessionWrong.length,c=idx-w;$("#tally").innerHTML='<b style="color:#7be3a6;">⭕ '+c+'</b> ／ <b style="color:#ff9a9a;">❌ '+w+'</b>';}
function flashMsg(txt,good){const f=$("#flash");f.textContent=txt;f.style.color=good?"#1fb35a":"#e23b3b";f.classList.remove("show");void f.offsetWidth;f.classList.add("show");}
function render(){
  revealed=false;answered=false;const it=items[idx];
  $("#qhead").textContent=quizTitle+"  "+(idx+1)+" / "+items.length;
  $("#prog").style.width=(idx/items.length*100)+"%";updTally();
  $("#qlabel").textContent=setMode==="yomi"?"読み 🎤":"書き ✍️";
  if(setMode==="yomi"){$("#sentence").innerHTML=ulKanji(it.s,it.t);$("#ansHint").textContent="下線の言葉を声に出して読もう";$("#padwrap").style.display="none";}
  else{$("#sentence").innerHTML=repKana(it.s,it.t,it.y);$("#ansHint").textContent="下線を漢字で書いてみよう";$("#padwrap").style.display="flex";clearPad();}
  $("#masked").style.display="block";$("#ans").style.display="none";$("#ansSub").style.display="none";$("#voiceStatus").textContent="";
  $("#prevBtn").style.visibility=idx>0?"visible":"hidden";
  $("#micBtn").style.display=(setMode==="yomi"&&SR)?"block":"none";$("#micBtn").disabled=false;
  $("#clearBtn").style.display=(setMode==="kaki")?"block":"none";
  $("#revealBtn").style.display="block";$("#judgeRow").style.display="none";
}
function doReveal(){revealed=true;const it=items[idx];$("#masked").style.display="none";
  $("#ans").style.display="block";$("#ans").textContent=setMode==="yomi"?it.y:it.t;
  $("#ansSub").style.display="block";$("#ansSub").textContent=setMode==="yomi"?("（"+it.t+"）"):("（"+it.y+"）");
  $("#micBtn").style.display="none";$("#clearBtn").style.display="none";$("#revealBtn").style.display="none";$("#judgeRow").style.display="flex";}
function judge(ok,silent){if(answered)return;answered=true;const it=items[idx];if(!ok)sessionWrong.push(it);record(it,ok);if(!silent){ok?chime():buzz();}
  if(idx<items.length-1){idx++;render();}else finish();}
function finish(){const w=sessionWrong.length,c=items.length-w;
  $("#doneInfo").innerHTML='<span style="color:#7be3a6;">⭕ '+c+'問</span>　／　<span style="color:#ff9a9a;">❌ '+w+'問</span>';
  lastWrong=sessionWrong.slice();
  if(w>0){$("#reviewBtn").style.display="block";$("#reviewBtn").textContent="❌ まちがえた "+w+"問を復習";$("#doneEmoji").textContent="📝";$("#doneTitle").textContent="おつかれさま！";}
  else{$("#reviewBtn").style.display="none";$("#doneEmoji").textContent="💯";$("#doneTitle").textContent="全問クリア！";if(soundOn)chime();}
  show("#done");}
$("#micBtn").onclick=startVoice;$("#clearBtn").onclick=clearPad;$("#revealBtn").onclick=doReveal;
$("#wrongBtn").onclick=()=>judge(false);$("#rightBtn").onclick=()=>judge(true);
$("#prevBtn").onclick=()=>{if(idx>0){idx--;render();}};
document.addEventListener("keydown",e=>{if($("#quiz").style.display==="none")return;
  if(!revealed){if(e.key===" "||e.key==="Enter"){e.preventDefault();if(setMode==="yomi"&&SR)startVoice();else doReveal();}}
  else{if(e.key==="1"||e.key.toLowerCase()==="o"||e.key==="ArrowRight")judge(true);else if(e.key==="2"||e.key.toLowerCase()==="x"||e.key==="ArrowLeft")judge(false);}});

/* ----- 苦手リスト ----- */
let weakMode="yomi";
$("#weakMode").addEventListener("click",e=>{const c=e.target.closest('.chip');if(!c)return;$("#weakMode").querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');weakMode=c.dataset.wmode;});
$("#weakListBtn").onclick=()=>{renderWeak();show("#weak");};
$("#weakBack").onclick=()=>show("#setup");
function renderWeak(){
  const list=weakItems().map(it=>({it,w:store.stats[it.id].w})).sort((a,b)=>b.w-a.w);
  const groups=[["3回以上まちがい",x=>x.w>=3],["2回まちがい",x=>x.w===2],["1回まちがい",x=>x.w===1]];
  let html="";let any=false;
  for(const[label,f]of groups){const g=list.filter(f);if(!g.length)continue;any=true;
    const ids=g.map(x=>x.it.id).join(",");
    html+='<div class="wgrp"><div class="wgh">'+label+'（'+g.length+'）<button class="btn ok sm" data-ids="'+ids+'">この'+g.length+'問を練習</button></div>';
    for(const x of g)html+='<div class="wrow"><b>'+esc(x.it.t)+'</b><span style="color:#5a6b7d;">'+esc(x.it.y)+'</span><small>'+esc(x.it.dan+x.it.sec+'：'+x.it.s)+'</small><em>✕'+x.w+'</em></div>';
    html+='</div>';}
  if(!any)html='<div style="text-align:center;padding:30px;">まだ間違いはありません 🎉<br>練習を始めましょう！</div>';
  $("#weakBody").innerHTML=html;
  $("#weakBody").querySelectorAll('button[data-ids]').forEach(b=>b.onclick=()=>{const its=b.dataset.ids.split(",").map(i=>byId[i]).filter(Boolean);if(!its.length)return;if(!pctx)setupPad();setMode=weakMode;baseMix=true;baseItems=its.slice();baseTitle="苦手 "+its.length+"問";startSession(shuffle(its),"苦手 "+its.length+"問");});
}
refreshDaily();
</script></body></html>
